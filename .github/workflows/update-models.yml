name: Update Models List

on:
  schedule:
    - cron: '0 9 * * 1'  # Weekly Monday 9am UTC
  workflow_dispatch:

jobs:
  update-models:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.actor == github.repository_owner
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci

      - name: Discover new models
        run: npm run update-models
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Query new models (append)
        run: npm run query -- --append
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Render static site (index + model pages + sitemap)
        run: npm run build-site

      - name: Regenerate OG image
        run: npm run generate-og

      - name: Compute branch date
        id: date
        run: echo "today=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Open PR with new models
        uses: peter-evans/create-pull-request@v6
        with:
          branch: bot/auto-update-models-${{ steps.date.outputs.today }}
          commit-message: "Auto-update models list ${{ steps.date.outputs.today }}"
          title: "Auto-update models list ${{ steps.date.outputs.today }}"
          body: |
            Automated weekly model discovery + query.

            - `build/models.yaml`: new models added (last 30 days, text-in/out only)
            - `site/data.json`: queries appended for the new models
          add-paths: |
            build/models.yaml
            site/data.json
            site/index.html
            site/m
            site/sitemap.xml
            site/og.png
            package.json
          delete-branch: true
